<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Магическая Интерактивная Страница - ДЕМО</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            cursor: none;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .magic-title {
            font-size: 3.5rem;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            animation: titleGlow 2s ease-in-out infinite alternate;
            margin-bottom: 1rem;
            text-align: center;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
            to { text-shadow: 0 0 30px rgba(255, 255, 255, 1), 0 0 40px rgba(255, 215, 0, 0.8); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            animation: fadeInOut 3s ease-in-out infinite;
            text-align: center;
            margin-bottom: 3rem;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .magic-button {
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            margin: 1rem;
            display: inline-block;
        }

        .magic-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.3);
        }

        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.8;
            pointer-events: none;
        }

        .floating-emoji:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-emoji:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .floating-emoji:nth-child(3) { top: 60%; left: 5%; animation-delay: 2s; }
        .floating-emoji:nth-child(4) { top: 70%; right: 10%; animation-delay: 3s; }
        .floating-emoji:nth-child(5) { top: 40%; left: 80%; animation-delay: 4s; }
        .floating-emoji:nth-child(6) { top: 80%; left: 50%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(-40px) rotate(-5deg); }
            75% { transform: translateY(-20px) rotate(3deg); }
        }

        .cursor-trail {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        .demo-info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            max-width: 300px;
        }

        @media (max-width: 768px) {
            .magic-title { font-size: 2.5rem; }
            .demo-info { position: relative; top: auto; right: auto; margin: 20px; }
        }
    </style>
</head>
<body>
    <div class="demo-info">
        <strong>🎉 ДЕМО версия</strong><br>
        Скачайте файлы index.html, style.css, script.js для полной версии!<br>
        <em>Эта версия работает автономно</em>
    </div>

    <div class="container">
        <h1 class="magic-title">✨ Добро пожаловать в мир магии! ✨</h1>
        <p class="subtitle">Наведите курсор и кликайте везде!</p>
        
        <div>
            <div class="magic-button" onclick="changeColors()">🎨 Изменить цвета</div>
            <div class="magic-button" onclick="createParticles()">🌟 Больше частиц</div>
            <div class="magic-button" onclick="surprise()">🎉 Сюрприз!</div>
        </div>

        <div class="floating-emoji">🦄</div>
        <div class="floating-emoji">🌈</div>
        <div class="floating-emoji">⭐</div>
        <div class="floating-emoji">🎈</div>
        <div class="floating-emoji">🎭</div>
        <div class="floating-emoji">🎪</div>
    </div>

    <div class="cursor-trail" id="trail"></div>

    <script>
        // Cursor trail
        const trail = document.getElementById('trail');
        document.addEventListener('mousemove', (e) => {
            trail.style.left = e.clientX - 10 + 'px';
            trail.style.top = e.clientY - 10 + 'px';
        });

        // Color themes
        const themes = [
            'linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c)',
            'linear-gradient(-45deg, #2196F3, #21CBF3, #45B7D1, #96C5F7)',
            'linear-gradient(-45deg, #FF9800, #FF5722, #E91E63, #9C27B0)',
            'linear-gradient(-45deg, #4CAF50, #8BC34A, #CDDC39, #009688)'
        ];
        let currentTheme = 0;

        function changeColors() {
            document.body.style.background = themes[currentTheme];
            currentTheme = (currentTheme + 1) % themes.length;
            showMessage('🎨 Тема изменена!');
        }

        function createParticles() {
            for(let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.style.cssText = `
                        position: fixed;
                        width: 6px; height: 6px;
                        background: #fff;
                        border-radius: 50%;
                        left: ${Math.random() * window.innerWidth}px;
                        top: ${window.innerHeight}px;
                        z-index: 9998;
                        animation: particle-up 3s linear forwards;
                        pointer-events: none;
                    `;
                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 3000);
                }, i * 100);
            }
            showMessage('🌟 Частицы запущены!');
        }

        function surprise() {
            document.querySelectorAll('.floating-emoji').forEach(emoji => {
                emoji.style.animation = 'float 0.5s ease-in-out infinite, spin 2s linear infinite';
            });
            setTimeout(() => {
                document.querySelectorAll('.floating-emoji').forEach(emoji => {
                    emoji.style.animation = 'float 6s ease-in-out infinite';
                });
            }, 5000);
            showMessage('🎉 СЮРПРИЗ! Смотрите на эмодзи!');
        }

        function showMessage(text) {
            const msg = document.createElement('div');
            msg.textContent = text;
            msg.style.cssText = `
                position: fixed; top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8); color: white;
                padding: 20px; border-radius: 10px;
                font-size: 1.2rem; z-index: 10000;
                animation: fade-message 3s forwards;
            `;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes particle-up {
                to { transform: translateY(-100vh); opacity: 0; }
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            @keyframes fade-message {
                0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
                20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            }
        `;
        document.head.appendChild(style);

        console.log('🌟 Добро пожаловать в магический мир! 🌟');
    </script>
</body>
</html>
